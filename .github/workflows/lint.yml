name: lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # warnings are errors. excluded categories are toolchain noise, not code:
      #   -options     target 8 "obsolete" note from newer jdks
      #   -serial      swing panels do not need serialVersionUID
      #   -this-escape jdk21-only lint firing on the standard setLayout-in-ctor pattern
      - name: javac -Xlint -Werror
        run: |
          mkdir -p out
          javac --release 8 -Xlint:all,-options,-serial,-this-escape -Werror -d out $(find src test -name '*.java')
